spring.application.name=rbdryfit
server.port=${RB_PORT:8080}

spring.sql.init.mode=never

spring.datasource.driver-class-name=org.firebirdsql.jdbc.FBDriver
spring.datasource.url=${RB_URL:jdbc:firebirdsql://localhost:3050/C:/EstudosFront/rbdryfit/rbdryfit/Dados/RBDRYFIT.FDB?encoding=UTF8}
spring.datasource.username=${RB_DB_USER:SYSDBA}
spring.datasource.password=${RB_DB_PASSWORD:masterkey}

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1 FROM RDB$DATABASE

app.database.initialize=${RB_DB_INITIALIZE:true}
app.database.seed-sample-data=${RB_DB_SEED_SAMPLE:true}

logging.level.org.springframework.jdbc.core=INFO
logging.level.com.zaxxer.hikari=INFO